name: Pages

# Build + deploy the SvelteKit landing site (landing/) to GitHub Pages whenever
# its source changes on main. Requires Pages to use the Actions source:
#   Settings ▸ Pages ▸ Build and deployment ▸ Source = GitHub Actions
#
# Note: the privacy policy is fetched at runtime from the repo's raw markdown
# (legal/privacy/*.md on main), so editing those files updates the live site
# without a redeploy — only landing/ source changes trigger a rebuild here.
on:
  push:
    branches: [main]
    paths:
      - landing/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress deploy finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Resolves the project-page base path (e.g. /cyclope) from the Pages config.
      - id: pages
        uses: actions/configure-pages@v6

      - name: Build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bun run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: landing/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
